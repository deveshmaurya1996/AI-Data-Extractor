services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: chatbot-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-chatbot}
      TZ: ${POSTGRES_TZ:-UTC}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: "./backend"
      dockerfile: "Dockerfile.backend"
    container_name: chatbot-backend
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-chatbot}"
      POLLINATIONS_API_KEY: ${POLLINATIONS_API_KEY:-}
      POLLINATIONS_MODEL: ${POLLINATIONS_MODEL:-openai}
      POLLINATIONS_BASE_URL: ${POLLINATIONS_BASE_URL:-https://gen.pollinations.ai/v1}
      POLLINATIONS_TIMEOUT: ${POLLINATIONS_TIMEOUT:-30}
      DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
